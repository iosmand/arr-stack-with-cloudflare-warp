name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy example.env to .env
        run: cp example.env .env

      - name: Validate docker compose config
        run: docker compose config
